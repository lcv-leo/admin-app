version: 2

# StepSecurity Secure Registry auth (matches project .npmrc).
# Install/dependency resolution only; operational npm commands use registry.npmjs.org.
# Dependabot uses its own secret namespace; Actions secrets do not
# propagate to Dependabot jobs.
registries:
  stepsecurity-javascript:
    type: npm-registry
    url: https://registry.stepsecurity.io/javascript
    token: ${{ secrets.DEPENDABOT_STEPSECURITY_NPM_TOKEN }}

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      day: "thursday"
      time: "01:00"
      timezone: "America/Los_Angeles"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps"
      include: "scope"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/"
    registries:
      - stepsecurity-javascript
    schedule:
      interval: "daily"
      day: "thursday"
      time: "01:00"
      timezone: "America/Los_Angeles"
    labels:
      - "dependencies"
      - "npm"
      - "frontend"
    commit-message:
      prefix: "deps"
      include: "scope"
    versioning-strategy: increase
    groups:
      dev-dependencies:
        patterns:
          - "eslint*"
          - "typescript"
          - "@types/*"
          - "wrangler"
          - "@cloudflare/*"
          - "vite*"
          - "@vitest/*"
          - "@biomejs/*"
        update-types:
          - "major"
          - "minor"
          - "patch"
      tiptap-editor:
        patterns:
          - "@tiptap/*"
          - "tiptap-*"
        update-types:
          - "major"
          - "minor"
          - "patch"
      tanstack:
        patterns:
          - "@tanstack/*"
        update-types:
          - "major"
          - "minor"
          - "patch"
      eslint-ecosystem:
        patterns:
          - "@eslint/*"
          - "eslint-plugin-*"
          - "typescript-eslint"
        update-types:
          - "major"
          - "minor"
          - "patch"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/tlsrpt-motor"
    registries:
      - stepsecurity-javascript
    schedule:
      interval: "daily"
      day: "thursday"
      time: "01:00"
      timezone: "America/Los_Angeles"
    labels:
      - "dependencies"
      - "npm"
      - "worker"
    commit-message:
      prefix: "deps"
      include: "scope"
    versioning-strategy: increase
    groups:
      dev-dependencies:
        patterns:
          - "eslint*"
          - "typescript"
          - "@types/*"
          - "wrangler"
          - "@cloudflare/*"
          - "vite*"
          - "@vitest/*"
          - "@biomejs/*"
        update-types:
          - "major"
          - "minor"
          - "patch"
      eslint-ecosystem:
        patterns:
          - "@eslint/*"
          - "eslint-plugin-*"
          - "typescript-eslint"
        update-types:
          - "major"
          - "minor"
          - "patch"
    open-pull-requests-limit: 10
