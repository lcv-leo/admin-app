name: D1 UPDATE admin_module_configs key calculadora-config -> calculadora-config

on:
  workflow_dispatch:

env:
  WRANGLER_VERSION: "latest"

jobs:
  rename:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Inject D1 database_id from secret
        run: |
          if [ -z "${D1_DATABASE_ID:-}" ]; then
            echo "::error::D1_DATABASE_ID secret is not set" >&2
            exit 1
          fi
          jq --arg id "$D1_DATABASE_ID" '.d1_databases[0].database_id = $id' admin-motor/wrangler.json > admin-motor/wrangler.json.tmp
          mv admin-motor/wrangler.json.tmp admin-motor/wrangler.json
        env:
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}

      - name: UPDATE admin_module_configs.module_key calculadora-config -> calculadora-config
        run: |
          set -euo pipefail
          npx wrangler@${WRANGLER_VERSION} d1 execute bigdata_db \
            --config admin-motor/wrangler.json --remote \
            --command "UPDATE admin_module_configs SET module_key = 'calculadora-config' WHERE module_key = 'calculadora-config';"
          echo "::group::Verify"
          npx wrangler@${WRANGLER_VERSION} d1 execute bigdata_db \
            --config admin-motor/wrangler.json --remote \
            --command "SELECT module_key FROM admin_module_configs WHERE module_key IN ('calculadora-config','calculadora-config') ORDER BY module_key;"
          echo "::endgroup::"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
