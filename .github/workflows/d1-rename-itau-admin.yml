name: D1 ALTER calculadora_* -> calc_* (admin-only tables)

on:
  workflow_dispatch:

env:
  WRANGLER_VERSION: "latest"

jobs:
  rename:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Inject D1 database_id from secret
        run: |
          if [ -z "${D1_DATABASE_ID:-}" ]; then
            echo "::error::D1_DATABASE_ID secret is not set" >&2
            exit 1
          fi
          jq --arg id "$D1_DATABASE_ID" '.d1_databases[0].database_id = $id' admin-motor/wrangler.json > admin-motor/wrangler.json.tmp
          mv admin-motor/wrangler.json.tmp admin-motor/wrangler.json
        env:
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}

      - name: Run ALTER TABLE statements (3 admin-only tables)
        run: |
          set -euo pipefail
          for OLD in calc_email_rate_limit calc_parametros_auditoria calc_parametros_calculo; do
            NEW="calc_${OLD#calculadora_}"
            echo "::group::ALTER TABLE $OLD RENAME TO $NEW"
            npx wrangler@${WRANGLER_VERSION} d1 execute bigdata_db \
              --config admin-motor/wrangler.json --remote \
              --command "ALTER TABLE $OLD RENAME TO $NEW;"
            echo "::endgroup::"
          done

          echo "::group::Verify rename (no calculadora_* tables remaining)"
          npx wrangler@${WRANGLER_VERSION} d1 execute bigdata_db \
            --config admin-motor/wrangler.json --remote \
            --command "SELECT name FROM sqlite_master WHERE type='table' AND name LIKE 'calculadora_%' ORDER BY name;"
          echo "::endgroup::"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
